name: Deploy to Hugging Face Space

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository with full history (needed for LFS)
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Important for full Git history

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir --prefer-binary -r requirements.txt
          sudo apt-get update && sudo apt-get install -y git-lfs
          git lfs install

      # 4️⃣ Configure Git
      - name: Configure Git
        run: |
          git config --global user.email "tanujapunwatkar@gmail.com"
          git config --global user.name "Tanujapunwatkar"

      # 5️⃣ Deploy to Hugging Face Space (ignore model files)
      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Add Hugging Face remote
          git remote add space https://tanujapunwatkar:${HF_TOKEN}@huggingface.co/spaces/Tanupunwatkar/Smart_farming || true
          
          # Ensure main branch
          git checkout -B main
          
          # Add all files EXCEPT model/saved/*.keras
          rsync -av --exclude 'model/saved/*.keras' --exclude '.git' --exclude 'venv' ./ ./hf_temp/
          
          cd hf_temp
          
          # Commit and push changes
          git add .
          git commit -m "Auto-deploy via GitHub Actions" || echo "No changes to commit"
          git push --force space main